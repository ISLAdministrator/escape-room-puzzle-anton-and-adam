<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ISL: The Aftermath</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

  <div id="start-screen">
    <div class="instruction-box">
      <h1>ISL EMERGENCY PROTOCOL</h1>
      <p>> The school is dark. Systems failing.</p>
      <p>> Identify the core values to restore the grid.</p>
      <hr>
      <button id="start-btn">INITIALIZE RECOVERY</button>
    </div>
  </div>

  <div id="transition-screen" class="hidden">
    <div class="instruction-box">
      <h1 id="note-title">GENERATOR 1 ONLINE</h1>
      <p id="note-text">Transferring power to the next sector...</p>
      <p class="quote">"History does not give answers. It gives answers."</p>
      <hr>
      <button id="next-lvl-btn">PROCEED TO NEXT GENERATOR</button>
    </div>
  </div>

  <div class="terminal-frame">
  <div class="scanlines"></div>
  <h1 class="critical-text" id="level-indicator">GENERATOR_01: OFFLINE</h1>

  <canvas id="gameCanvas" width="600" height="400" class="hidden"></canvas>

  <div class="puzzle-area" id="terminal-area">
    <p>DECODE SEQUENCE:</p>
    <h2 id="scrambled-word">EMDPWREOE</h2>

    <input type="text" id="user-input" placeholder="TYPE WORD..." autocomplete="off">
    <br>
    <button id="button">RUN DIAGNOSTICS</button>
  </div>
</div>

    <p id="output"></p>
    <p id="hint" class="hidden-hint"></p>
  </div>

  <script src="script.js"></script>
</body>

</html>
